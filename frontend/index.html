<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employability App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Select Your Skills</h1>
    <form id="skillForm">
      <label><input type="checkbox" name="skill" value="Python"> Python</label>
      <label><input type="checkbox" name="skill" value="Communication"> Communication</label>
      <label><input type="checkbox" name="skill" value="Fashion Design"> Fashion Design</label>
      <label><input type="checkbox" name="skill" value="Teaching"> Teaching</label>
      <label><input type="checkbox" name="skill" value="Nursing"> Nursing</label>
      <label><input type="checkbox" name="skill" value="Project Management"> Project Management</label>
      <button type="button" onclick="calculateEmployability()">Submit</button>
    </form>
    <div id="results"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
